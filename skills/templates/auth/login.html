{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-lg-5 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header" style="background: linear-gradient(135deg, #003D7A, #001F47); border: none; padding: 1.5rem;">
                <h3 class="mb-0" style="color: white; font-weight: 700;">🔓 Log In</h3>
            </div>
            
            <div class="card-body" style="padding: 2rem;">
                <!-- Form -->
                <form method="post">
                    {% csrf_token %}
                    
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            name="username" 
                            id="id_username"
                            class="form-control"
                            placeholder="Enter your username"
                            required
                        >
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-4">
                        <label for="id_password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            id="id_password"
                            class="form-control"
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" style="font-weight: 600; padding: 0.9rem;">
                        🔓 Log In
                    </button>
                </form>
                
                <!-- Sign Up Link -->
                <p class="text-center text-muted mb-0" style="font-weight: 500;">
                    Don't have an account? 
                    <a href="{% url 'register' %}" style="color: #003D7A; font-weight: 700; text-decoration: none;">Sign up here</a>
                </p>
            </div>
        </div>
        
        <!-- Demo Note -->
        <div class="alert" style="background: linear-gradient(135deg, rgba(0, 61, 122, 0.15), rgba(206, 203, 0, 0.08)); border: 2px solid rgba(0, 61, 122, 0.3); border-radius: 12px; border-left: 4px solid #FECB00; margin-top: 2rem;">
            <h6 style="color: #003D7A; font-weight: 700; margin-bottom: 0.5rem;">🎓 First Time Here?</h6>
            <p class="mb-0 small" style="color: #666;">
                Create a new account to post your skills and explore what other Bears are offering.
            </p>
        </div>
    </div>
</div>
{% endblock %}
